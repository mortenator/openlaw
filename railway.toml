[build]
builder = "nixpacks"
rootDirectory = "backend"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

# Railway crons removed — scheduling handled by Paperclip heartbeats (Phase 4).
# See backend/scripts/enable_heartbeats.py for the migration script.
